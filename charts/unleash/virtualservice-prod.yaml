apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: unleash-vs
  namespace: unleash
spec:
  hosts:
    - "unleash.sourceready.com"
  gateways:
    - istio-system/istio-gateway
  http:
    - match:
        - uri:
            prefix: /
      route:
        - destination:
            port:
              number: 4242
            host: unleash.unleash.svc.cluster.local
---
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: unleash-dr
  namespace: unleash
spec:
  host: unleash.unleash.svc.cluster.local
